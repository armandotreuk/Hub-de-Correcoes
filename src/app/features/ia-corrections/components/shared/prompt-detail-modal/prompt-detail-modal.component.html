<div class="modal-overlay" *ngIf="isOpen" (click)="onOverlayClick($event)">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Detalhes do Prompt</h3>
      <button class="btn-close" (click)="onClose()">
        <i class="ri-close-line"></i>
      </button>
    </div>

    <div class="modal-body" *ngIf="prompt">
      <div class="form-group">
        <label>Título</label>
        <input
          type="text"
          [ngModel]="editedTitle()"
          (ngModelChange)="editedTitle.set($event)"
          [readonly]="!allowEdit"
          [class.readonly]="!allowEdit"
        />
      </div>

      <div class="form-group">
        <label>Unidade de Negócio</label>
        <input type="text" [value]="prompt.businessUnitName" readonly class="readonly" />
      </div>

      <div class="form-group">
        <label>Tipo de Atividade</label>
        <input type="text" [value]="prompt.activityTypeName" readonly class="readonly" />
      </div>

      <div class="form-group">
        <label>Prompt Avaliação</label>
        <textarea
          [ngModel]="editedBodyEvaluation()"
          (ngModelChange)="editedBodyEvaluation.set($event)"
          [readonly]="!allowEdit"
          [class.readonly]="!allowEdit"
          rows="5"
        ></textarea>
      </div>

      <div class="form-group">
        <label>Prompt Feedback</label>
        <textarea
          [ngModel]="editedBodyFeedback()"
          (ngModelChange)="editedBodyFeedback.set($event)"
          [readonly]="!allowEdit"
          [class.readonly]="!allowEdit"
          rows="5"
        ></textarea>
      </div>

      <div class="form-group">
        <label>Observações</label>
        <textarea
          [ngModel]="observations()"
          (ngModelChange)="observations.set($event)"
          rows="4"
          placeholder="Adicione observações sobre este prompt..."
        ></textarea>
        <button class="btn-save-observations" (click)="saveObservationsClick()">
          Salvar Comentário
        </button>
      </div>
    </div>

    <div class="modal-footer" *ngIf="allowEdit">
      <button class="btn-cancel" (click)="onClose()">Cancelar</button>
      <button class="btn-save" (click)="savePromptClick()">Salvar Prompt</button>
    </div>
  </div>
</div>
